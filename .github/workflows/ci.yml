#runs on every PR Request

name: CI

on:
  pull_request:
    branches: 
      - dev
      - staging
      - main

jobs:
    ci:
        name: Lint, Test and Build
        runs-on: ubuntu-latest

        strategy:
            matrix:
                include:

            #----------Go Services---------------
                    - service: product-service
                      path: app/go-services/product-service
                      lang: go
                    - service: payment-service
                      path: app/go-services/payment-service
                      lang: go
                    - service: user-service
                      path: app/go-services/user-service
                      lang: go

             #----------Node services---------------
                    - service: cart-service
                      path: app/node-services/cart-service
                      lang: node
                    - service: shipping-service
                      path: app/node-services/shipping-service
                      lang: node

             #----------Python services---------------
                    - service: order-service
                      path: app/python-services/order-service
                      lang: python
                    - service: inventory-service
                      path: app/python-services/inventory-service
                      lang: python
                    - service: notification-service
                      path: app/python-services/notification-service
                      lang: python

        steps:
            - name: Checkout code
              uses: actions/checkout@v3

              #----------------Go setup----------------

            - name: Setup Go
              if: matrix.lang == 'go'
              uses: actions/setup-go@v4
              with:
                go-version: '1.20'

            - name: Go lint and test
              if: matrix.lang == 'go'
              working-directory: ${{ matrix.path }}
              run: |
               go mod tidy
               go vet ./...
               go test ./...
               

            # -------------------Node Setup---------------
            - name: Setup Node
              if: matrix.lang == 'node'
              uses: actions/setup-node@v3
              with:
                node-version: '18'

            - name: Node lint & test
              if: matrix.lang == 'node'
              working-directory: ${{ matrix.path }}
              run: |
               npm ci
               npm run lint --if-present
               npm test --if-present



      #----------------Python Setup----------------
            - name: Setup Python
              if: matrix.lang == 'python'
              uses: actions/setup-python@v4
              with:
               python-version: '3.12'

            - name: Python lint & test
              if: matrix.lang == 'python'
              working-directory: ${{ matrix.path }}
              run: |
               pip install -r requirements.txt
               pip install flake8 pytest
               flake8 . --count --exit-zero
               pytest --if-present || true



       # -----------Docker Build Validation (all services)-----
            - name: Validate Docker build
              run: docker build -t ${{ matrix.service }}:test ${{ matrix.path }}
                    

