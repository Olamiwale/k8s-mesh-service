apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-deployment-v1
  namespace: testing
  labels:
    app: payment-service
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
      version: v1
  template:
    metadata:
      labels:
        app: payment-service
        version: v1
    spec:
      containers:
        - name: payment-service
          image: payment-service
          imagePullPolicy: Never      # temporarily set to Never for local development with minikube
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
